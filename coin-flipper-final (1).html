<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CoinFlipperZZ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+JP:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c8922a;
    --gold-light: #f0c060;
    --gold-dark: #7a4e0a;
    --dark: #0d0800;
    --dark2: #1a0e00;
    --dark3: #2a1400;
    --crimson: #8b1a1a;
    --steel: #4a6080;
    --jade: #1a4a3a;
    --parchment: #f5e8c0;
  }

  html, body {
    width: 100%; min-height: 100%;
    background: var(--dark);
    font-family: 'Cinzel', Georgia, serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(200,146,42,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(26,74,58,0.2) 0%, transparent 50%),
      #0d0800;
  }

  /* ── Background canvas ── */
  #bg-canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }

  /* ── Header ── */
  .header {
    position: relative; z-index: 2;
    text-align: center;
    padding: 2rem 1rem 0.5rem;
    width: 100%;
  }
  .header-eyebrow {
    font-size: 10px; letter-spacing: 5px;
    color: var(--gold); opacity: 0.7;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .header-title {
    font-size: clamp(20px, 5vw, 32px);
    font-weight: 900; color: var(--gold-light);
    line-height: 1.1; letter-spacing: 2px;
    text-shadow: 0 0 40px rgba(240,192,96,0.3);
  }
  .header-title span { color: var(--gold); }
  .header-divider {
    margin: 10px auto;
    width: 120px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .header-sub {
    font-size: 11px; letter-spacing: 3px;
    color: rgba(240,192,96,0.5);
    text-transform: uppercase;
  }

  /* ── Legends row ── */
  .legends {
    position: relative; z-index: 2;
    display: flex; align-items: center; justify-content: center;
    gap: 0; width: 100%; max-width: 420px;
    padding: 1rem 1rem 0.5rem;
  }
  .legend-item {
    flex: 1; text-align: center; padding: 0 8px;
  }
  .legend-name {
    font-size: clamp(11px, 3vw, 14px);
    font-weight: 700; letter-spacing: 1px;
    line-height: 1.2;
  }
  .legend-name.west { color: var(--gold-light); }
  .legend-name.east { color: #a0d8b0; font-family: 'Noto Serif JP', serif; }
  .legend-title {
    font-size: 9px; letter-spacing: 2px;
    opacity: 0.6; margin-top: 2px;
    text-transform: uppercase;
  }
  .legend-title.west { color: var(--gold); }
  .legend-title.east { color: #70b890; }
  .vs-badge {
    width: 36px; height: 36px; flex-shrink: 0;
    border-radius: 50%;
    background: var(--dark3);
    border: 1px solid var(--gold-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 900;
    color: var(--gold); letter-spacing: 1px;
  }

  /* ── Coin scene ── */
  .coin-scene {
    position: relative; z-index: 2;
    width: min(220px, 55vw);
    height: min(220px, 55vw);
    perspective: 1000px;
    margin: 0.5rem auto 0.5rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .coin {
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    position: relative;
    transition: none;
  }
  .coin-face {
    position: absolute; inset: 0;
    border-radius: 50%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
  }
  .coin-face::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    border: clamp(5px,1.5vw,8px) solid #c8922a;
    z-index: 3; pointer-events: none;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.4), inset 0 0 8px rgba(255,220,100,0.2);
  }
  .coin-face::after {
    content: '';
    position: absolute;
    inset: clamp(10px,2vw,16px);
    border-radius: 50%;
    border: 1px solid rgba(255,220,100,0.35);
    z-index: 3; pointer-events: none;
  }
  /* Coin colours now mirror the background palette */
  .coin-heads {
    background: radial-gradient(circle at 38% 32%,
      #2a1c08 0%, #150e04 55%, #0d0800 100%);
  }
  .coin-tails {
    background: radial-gradient(circle at 38% 32%,
      #0f1f18 0%, #081510 55%, #050e0a 100%);
    transform: rotateY(180deg);
  }

  /* Override the border ring to use a dimmer gold so it reads as coin edge */
  .coin-face::before {
    border-color: #a06818 !important;
    box-shadow: inset 0 0 24px rgba(0,0,0,0.7),
                inset 0 0 6px rgba(200,160,60,0.15) !important;
  }
  .coin-face::after {
    border-color: rgba(200,150,50,0.25) !important;
  }

  /* ── HEADS text styling ── */
  .heads-word {
    position: relative; z-index: 2;
    font-size: clamp(28px, 9vw, 46px);
    font-weight: 900;
    font-family: 'Cinzel', Georgia, serif;
    letter-spacing: 3px;
    color: #c8922a;
    text-shadow:
      0 0 18px rgba(200,146,42,0.7),
      0 0 40px rgba(200,146,42,0.3);
    text-transform: uppercase;
    line-height: 1;
  }
  .heads-sub {
    position: relative; z-index: 2;
    font-size: clamp(7px, 2vw, 10px);
    letter-spacing: 4px;
    color: rgba(200,146,42,0.5);
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* ── TAILS portrait ── */
  .tails-svg { width: 62%; height: 62%; position: relative; z-index: 2; }
  .tails-label {
    position: relative; z-index: 2;
    font-size: clamp(7px,1.8vw,10px);
    color: #60a880; letter-spacing: 2px;
    font-weight: 700; margin-top: 4px;
    text-transform: uppercase;
    font-family: 'Noto Serif JP', serif;
  }

  /* ── Result ── */
  .result-area {
    position: relative; z-index: 2;
    height: 44px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 0.5rem;
  }
  .result-text {
    font-size: clamp(20px, 5vw, 28px);
    font-weight: 900; letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.35s, transform 0.35s;
  }
  .result-text.show { opacity: 1; transform: translateY(0); }
  .result-text.heads { color: var(--gold-light); text-shadow: 0 0 20px rgba(240,192,96,0.5); }
  .result-text.tails { color: #a0e8b8; text-shadow: 0 0 20px rgba(100,220,150,0.4); }

  /* ── Buttons ── */
  .btn-row {
    position: relative; z-index: 2;
    display: flex; gap: 14px;
    justify-content: center;
    padding: 0 1rem;
    margin-bottom: 1.2rem;
  }
  .flip-btn {
    background: linear-gradient(135deg, #c8862a 0%, #e09a38 50%, #c8862a 100%);
    color: #1a0800;
    border: none; border-radius: 50px;
    padding: clamp(12px,3vw,16px) clamp(28px,7vw,48px);
    font-size: clamp(13px,3.5vw,16px);
    font-weight: 900;
    font-family: 'Cinzel', Georgia, serif;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
    box-shadow: 0 4px 20px rgba(200,134,42,0.4);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .flip-btn:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(200,134,42,0.3); }
  .flip-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  /* ── Stats ── */
  .stats {
    position: relative; z-index: 2;
    display: flex; gap: 10px;
    justify-content: center;
    padding: 0 1rem 2rem;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: rgba(26,14,0,0.8);
    border: 1px solid rgba(200,134,42,0.3);
    border-radius: 20px;
    padding: 8px 18px;
    text-align: center;
    min-width: 72px;
  }
  .stat-num {
    font-size: clamp(18px,4vw,22px);
    font-weight: 900;
    line-height: 1;
  }
  .stat-num.all { color: var(--gold-light); }
  .stat-num.h { color: #f0d080; }
  .stat-num.t { color: #90d8b0; }
  .stat-lbl {
    font-size: 9px; letter-spacing: 2px;
    color: rgba(240,192,96,0.45);
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── Footer ── */
  .footer {
    position: relative; z-index: 2;
    text-align: center;
    padding: 0 1rem 1.5rem;
    font-size: 9px; letter-spacing: 3px;
    color: rgba(200,134,42,0.3);
    text-transform: uppercase;
  }

  /* ── Tap hint ── */
  .tap-hint {
    position: relative; z-index: 2;
    font-size: 10px; letter-spacing: 2px;
    color: rgba(240,192,96,0.35);
    text-align: center;
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  /* shimmer on coin tap */
  @keyframes shimmer {
    0% { opacity: 0.6; }
    50% { opacity: 1; }
    100% { opacity: 0.6; }
  }
  .flipping .coin-face::before { animation: shimmer 0.3s infinite; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="header">
  <div class="header-eyebrow">coinflipperzz.com</div>
  <div class="header-title">Heads <span>vs</span> Tails</div>
  <div class="header-divider"></div>
  <div class="header-sub">Coin of Fate · Let destiny decide</div>
</div>

<div class="legends">
  <div class="legend-item">
    <div class="legend-name west">Heads</div>
    <div class="legend-title west">Front of Coin</div>
  </div>
  <div class="vs-badge">VS</div>
  <div class="legend-item">
    <div class="legend-name east">Tails</div>
    <div class="legend-title east">Back of Coin</div>
  </div>
</div>

<div class="coin-scene" id="coinScene" onclick="flipCoin()" title="Tap to flip">
  <div class="coin" id="coin">

    <!-- HEADS: Bold text face -->
    <div class="coin-face coin-heads">
      <div class="heads-word">HEADS</div>
    </div>

    <!-- TAILS: Bold text face -->
    <div class="coin-face coin-tails">
      <div class="heads-word" style="color:#60c890;text-shadow:0 0 18px rgba(80,200,130,0.7),0 0 40px rgba(80,200,130,0.3);">TAILS</div>
    </div>

  </div>
</div>

<div class="tap-hint" id="tapHint">Tap coin or button to flip</div>

<div class="result-area">
  <div class="result-text" id="result"></div>
</div>

<div class="btn-row">
  <button class="flip-btn" id="flipBtn" onclick="flipCoin()">⚔ Flip</button>
</div>

<div class="stats">
  <div class="stat-pill">
    <div class="stat-num all" id="totalCount">0</div>
    <div class="stat-lbl">Total</div>
  </div>
  <div class="stat-pill">
    <div class="stat-num h" id="headsCount">0</div>
    <div class="stat-lbl">Heads</div>
  </div>
  <div class="stat-pill">
    <div class="stat-num t" id="tailsCount">0</div>
    <div class="stat-lbl">Tails</div>
  </div>
</div>

<div class="footer">Heads &nbsp;·&nbsp; Tails &nbsp;·&nbsp; One Coin · One Fate</div>

<script>
  // Starfield background
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [], W, H;

  function resizeCanvas() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 80; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.4 + 0.3,
        a: Math.random(),
        da: (Math.random() - 0.5) * 0.008
      });
    }
  }

  function drawBg() {
    ctx.clearRect(0, 0, W, H);
    // Column silhouettes left
    ctx.fillStyle = '#2a1400';
    [[55,240,16,180],[105,265,12,155],[150,280,10,140]].forEach(([x,y,w,h]) => {
      ctx.beginPath(); ctx.roundRect(x - w/2, y, w, h, 2); ctx.fill();
      ctx.fillRect(x - w/2 - 6, y - 12, w + 12, 12);
    });
    // Column silhouettes right
    [[W-55,240,16,180],[W-105,265,12,155],[W-150,280,10,140]].forEach(([x,y,w,h]) => {
      ctx.beginPath(); ctx.roundRect(x - w/2, y, w, h, 2); ctx.fill();
      ctx.fillRect(x - w/2 - 6, y - 12, w + 12, 12);
    });
    // Ground
    ctx.fillStyle = '#1a0a00';
    ctx.fillRect(0, H * 0.78, W, H * 0.22);

    // Stars
    stars.forEach(s => {
      s.a += s.da;
      if (s.a > 1) s.da = -Math.abs(s.da);
      if (s.a < 0) s.da = Math.abs(s.da);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(240,200,120,${Math.max(0, Math.min(1, s.a))})`;
      ctx.fill();
    });

    // Moon
    ctx.beginPath();
    ctx.arc(W * 0.82, H * 0.12, 28, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200,160,60,0.15)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(W * 0.82, H * 0.12, 20, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200,160,60,0.12)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(W * 0.82, H * 0.12, 12, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200,160,60,0.2)';
    ctx.fill();

    // Japan rising sun (right side)
    ctx.beginPath();
    ctx.arc(W * 0.15, H * 0.15, 22, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(180,60,40,0.13)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(W * 0.15, H * 0.15, 14, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(180,60,40,0.1)';
    ctx.fill();

    requestAnimationFrame(drawBg);
  }

  resizeCanvas(); initStars(); drawBg();
  window.addEventListener('resize', () => { resizeCanvas(); initStars(); });

  // Coin flip logic
  let total = 0, heads = 0, tails = 0, flipping = false;

  function flipCoin() {
    if (flipping) return;
    flipping = true;

    const btn = document.getElementById('flipBtn');
    const coin = document.getElementById('coin');
    const result = document.getElementById('result');
    const hint = document.getElementById('tapHint');
    const scene = document.getElementById('coinScene');

    btn.disabled = true;
    hint.style.opacity = '0';
    result.classList.remove('show', 'heads', 'tails');
    result.textContent = '';
    scene.classList.add('flipping');

    const isHeads = Math.random() < 0.5;
    const spins = 6 + Math.floor(Math.random() * 5);
    const totalDeg = spins * 360 + (isHeads ? 0 : 180);
    const duration = 1400;
    const start = performance.now();

    function animate(now) {
      const elapsed = now - start;
      const p = Math.min(elapsed / duration, 1);
      const ease = p < 0.5
        ? 4 * p * p * p
        : 1 - Math.pow(-2 * p + 2, 3) / 2;
      coin.style.transform = `rotateY(${ease * totalDeg}deg)`;
      if (p < 1) {
        requestAnimationFrame(animate);
      } else {
        coin.style.transform = `rotateY(${isHeads ? 0 : 180}deg)`;
        scene.classList.remove('flipping');
        total++;
        if (isHeads) {
          heads++;
          result.textContent = 'Heads!';
          result.classList.add('heads');
        } else {
          tails++;
          result.textContent = 'Tails!';
          result.classList.add('tails');
        }
        result.classList.add('show');
        document.getElementById('totalCount').textContent = total;
        document.getElementById('headsCount').textContent = heads;
        document.getElementById('tailsCount').textContent = tails;
        btn.disabled = false;
        hint.style.opacity = '1';
        flipping = false;
      }
    }
    requestAnimationFrame(animate);
  }
</script>
</body>
</html>
